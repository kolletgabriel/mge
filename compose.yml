services:

  db:
    image: postgres:18.3-trixie
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      # - postgres_data:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: ./back
    restart: unless-stopped
    environment:
      UVICORN_UDS: /run/mge/uvicorn.sock
      DB_URL: postgresql+asyncpg://postgres:postgres@db:5432/postgres
      SESSION_SECRET: secret
    volumes:
      - unix_socket:/run/mge
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - path: ./back
          action: sync+restart
          target: /app
          ignore:
            ./back/.venv

  proxy:
    image: nginx:1.29.8-trixie
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - unix_socket:/run/mge:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./front/dist:/usr/share/nginx/html:ro
    depends_on:
      - api

volumes:
  # postgres_data:
  unix_socket:
